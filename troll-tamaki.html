<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Quà Bí Mật Dành Cho Bạn 🎁</title>
<style>
  /* ══════════════════════════════
     ĐỔI CÁC BIẾN SAU CHO DỄ:
     ══════════════════════════════ */
  :root {
    --anh-ban: "THAY_LINK_ANH_BAN_VAO_DAY.jpg"; /* ← thay link ảnh dìm hàng */
    --ten-ban: "✨ KAYLEE BÊ ĐÊ - TAMAKI HOOC MÔN NAM ✨"; /* ← thay tên muốn hiện */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── Phông chữ sến ── */
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&display=swap');

  /* ════════════════════════════
     NỀN TRANG - Phong cách 90s
     ════════════════════════════ */
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    background:
      radial-gradient(ellipse 80% 60% at 50% 110%, #ff006688 0%, transparent 55%),
      radial-gradient(ellipse 60% 80% at 15% 85%,  #cc003388 0%, transparent 50%),
      radial-gradient(ellipse 55% 70% at 85% 90%,  #ff336688 0%, transparent 55%),
      radial-gradient(ellipse 100% 100% at 50% 50%, #3d001a 30%, #1a000d 100%);
    font-family: 'Dancing Script', cursive;
  }

  /* ── Tia nắng ── */
  .sunbeams {
    position: fixed; inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .ray {
    position: absolute;
    top: -20%;
    left: 50%;
    width: 3px;
    height: 180%;
    transform-origin: top center;
    background: linear-gradient(180deg, #ffe8a077 0%, transparent 65%);
    filter: blur(6px);
  }
  .ray:nth-child(1)  { transform: rotate(-50deg); opacity: 0.45; }
  .ray:nth-child(2)  { transform: rotate(-35deg); opacity: 0.35; }
  .ray:nth-child(3)  { transform: rotate(-20deg); opacity: 0.55; }
  .ray:nth-child(4)  { transform: rotate(-5deg);  opacity: 0.4;  }
  .ray:nth-child(5)  { transform: rotate(10deg);  opacity: 0.5;  }
  .ray:nth-child(6)  { transform: rotate(25deg);  opacity: 0.35; }
  .ray:nth-child(7)  { transform: rotate(40deg);  opacity: 0.45; }
  .ray:nth-child(8)  { transform: rotate(55deg);  opacity: 0.3;  }

  /* ── Lens flare ── */
  .flare {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    mix-blend-mode: screen;
  }
  .flare-big {
    width: 350px; height: 350px;
    top: -90px; left: 50px;
    background: radial-gradient(circle, #fffbe8bb 0%, #ffe08033 20%, transparent 65%);
    filter: blur(10px);
    animation: flare-pulse 4s ease-in-out infinite;
  }
  .flare-small {
    width: 100px; height: 100px;
    top: 30px; left: 240px;
    background: radial-gradient(circle, #ffffffaa 0%, transparent 70%);
    filter: blur(2px);
    animation: flare-pulse 2.8s ease-in-out infinite reverse;
  }
  .flare-streak {
    width: 80px; height: 4px;
    top: 70px; left: 130px;
    background: linear-gradient(90deg, transparent, #ffffff99, transparent);
    filter: blur(2px);
    transform: rotate(-18deg);
    border-radius: 4px;
    animation: streak 3.5s ease-in-out infinite;
  }
  @keyframes flare-pulse {
    0%,100% { opacity: 0.65; transform: scale(1);    }
    50%      { opacity: 1;    transform: scale(1.06); }
  }
  @keyframes streak {
    0%,100% { opacity: 0.3; width: 80px;  }
    50%      { opacity: 0.9; width: 150px; }
  }

  /* ── Hoa hồng góc ── */
  .roses {
    position: fixed; inset: 0;
    pointer-events: none;
  }
  .rose { position: absolute; }
  .rose.bl { bottom: -20px; left: -20px; width: 200px; transform: rotate(-10deg); filter: drop-shadow(0 0 18px #ff005588); }
  .rose.br { bottom: -20px; right: -20px; width: 220px; transform: rotate(15deg);  filter: drop-shadow(0 0 20px #cc003388); }
  .rose.tl { top: -20px;   left: 20px;   width: 150px; transform: rotate(8deg);   filter: drop-shadow(0 0 14px #ff336688); opacity: 0.9; }
  .rose.tr { top: -20px;   right: 20px;  width: 160px; transform: rotate(-18deg); filter: drop-shadow(0 0 16px #ff006688); opacity: 0.85; }

  /* ── Kim tuyến lấp lánh ── */
  .sparkle-layer {
    position: fixed; inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .sparkle {
    position: absolute;
    border-radius: 50%;
    background: #ffd700;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0.3); }
    50%      { opacity: 1; transform: scale(1.3); }
  }

  /* ═══════════════════════════════
     HỘP NỘI DUNG TRUNG TÂM
     ═══════════════════════════════ */
  .card-box {
    position: relative;
    z-index: 10;
    background: linear-gradient(135deg, #ff006633 0%, #cc003344 50%, #ff336633 100%);
    backdrop-filter: blur(4px);
    border: 3px solid;
    border-image: linear-gradient(135deg, #ffd700, #b8860b, #ffd700, #b8860b) 1;
    border-radius: 20px;
    padding: 50px 60px;
    text-align: center;
    max-width: 520px;
    width: 90vw;
    box-shadow:
      0 0 40px #ff005566,
      0 0 80px #cc003333,
      inset 0 0 30px #ff006622;
  }

  /* Viền xoắn ốc vàng bao quanh hộp */
  .card-box::before {
    content: '';
    position: absolute; inset: -6px;
    border-radius: 24px;
    border: 2px solid transparent;
    background: linear-gradient(#ffd700, #b8860b, #ffd700, #b8860b) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    pointer-events: none;
  }

  .welcome-text {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    color: #ffd700;
    text-shadow:
      0 0 10px #ffd700,
      0 0 25px #ff6699,
      2px 2px 4px #000;
    margin-bottom: 0.5em;
    animation: glow-text 2.5s ease-in-out infinite;
  }

  .invite-text {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1rem, 2.2vw, 1.35rem);
    color: #ffe0ee;
    text-shadow: 0 0 8px #ff336688, 1px 1px 3px #000;
    line-height: 1.8;
    margin-bottom: 1.8em;
  }

  @keyframes glow-text {
    0%,100% { text-shadow: 0 0 10px #ffd700, 0 0 25px #ff6699, 2px 2px 4px #000; }
    50%      { text-shadow: 0 0 20px #ffd700, 0 0 50px #ff99bb, 0 0 70px #ff006688, 2px 2px 4px #000; }
  }

  /* ── NÚT BẤM NHẬN QUÀ ── */
  .gift-btn {
    display: inline-block;
    background: linear-gradient(135deg, #ff1493, #ff69b4, #ff1493);
    background-size: 200% 200%;
    color: #fff;
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.2rem, 2.5vw, 1.7rem);
    font-weight: 700;
    padding: 18px 48px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    text-shadow: 1px 1px 3px #880033;
    box-shadow:
      0 0 20px #ff1493aa,
      0 0 40px #ff006688,
      0 5px 15px #00000066;
    animation:
      btn-pulse 1.4s ease-in-out infinite,
      btn-bg    3s linear infinite;
    outline: 3px solid #ffd700;
    outline-offset: 4px;
    letter-spacing: 0.05em;
    transition: transform 0.1s;
  }
  .gift-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 35px #ff1493cc, 0 0 60px #ff006699, 0 5px 20px #000000aa;
  }
  .gift-btn:active { transform: scale(0.96); }

  @keyframes btn-pulse {
    0%,100% { transform: scale(1);    box-shadow: 0 0 20px #ff1493aa, 0 0 40px #ff006688, 0 5px 15px #00000066; }
    50%      { transform: scale(1.06); box-shadow: 0 0 35px #ff1493cc, 0 0 70px #ff0066aa, 0 5px 20px #00000066; }
  }
  @keyframes btn-bg {
    0%   { background-position: 0%   50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0%   50%; }
  }

  /* ═══════════════════════════════
     OVERLAY TROLL
     ═══════════════════════════════ */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 9999;
    background: radial-gradient(ellipse at center, #1a0010 0%, #0d0008 100%);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 36px;
  }
  .overlay.show { display: flex; }

  /* ── Ảnh tròn xoay ── */
  .troll-avatar {
    width: min(280px, 55vw);
    height: min(280px, 55vw);
    border-radius: 50%;
    object-fit: cover;
    border: 6px solid #ffd700;
    box-shadow:
      0 0 30px #ffd700,
      0 0 60px #ff006688,
      0 0 100px #ff003344;
    animation: spin-sassy 3s linear infinite;
  }
  /* Placeholder khi chưa có link ảnh thật */
  .avatar-placeholder {
    width: min(280px, 55vw);
    height: min(280px, 55vw);
    border-radius: 50%;
    border: 6px solid #ffd700;
    background: linear-gradient(135deg, #ff1493, #ff69b4, #cc0033);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(3rem, 10vw, 6rem);
    box-shadow: 0 0 30px #ffd700, 0 0 60px #ff006688;
    animation: spin-sassy 3s linear infinite;
  }

  @keyframes spin-sassy {
    0%   { transform: rotate(0deg)   scale(1);    }
    25%  { transform: rotate(90deg)  scale(1.04); }
    50%  { transform: rotate(180deg) scale(1);    }
    75%  { transform: rotate(270deg) scale(1.04); }
    100% { transform: rotate(360deg) scale(1);    }
  }

  /* ── Dòng chữ nhấp nháy đổi màu ── */
  .troll-text {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(1.6rem, 4.5vw, 3rem);
    text-align: center;
    padding: 0 20px;
    animation: rainbow-blink 0.6s steps(1) infinite;
    text-shadow: 2px 2px 8px #000, 0 0 20px currentColor;
    max-width: 700px;
  }

  @keyframes rainbow-blink {
    0%   { color: #ff1493; }
    14%  { color: #ffd700; }
    28%  { color: #ff69b4; }
    42%  { color: #ff0000; }
    57%  { color: #ff99cc; }
    71%  { color: #ffaa00; }
    85%  { color: #ff3388; }
    100% { color: #ff1493; }
  }

  /* ── Nút đóng overlay ── */
  .close-btn {
    position: absolute;
    top: 20px; right: 24px;
    background: none;
    border: 2px solid #ffd700;
    border-radius: 50%;
    width: 44px; height: 44px;
    color: #ffd700;
    font-size: 1.3rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.7;
    transition: opacity 0.2s, transform 0.2s;
  }
  .close-btn:hover { opacity: 1; transform: scale(1.1); }

  /* ── Extra kim tuyến rơi trong overlay ── */
  .overlay-glitter {
    position: absolute; inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .og {
    position: absolute;
    border-radius: 50%;
    animation: fall-glitter linear infinite;
  }
  @keyframes fall-glitter {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0.2; }
  }
</style>
</head>

<!-- Kim tuyến nền -->
<div class="sparkle-layer" id="sparkleLayer"></div>

<!-- ════════════════════════════════
     HỘP NỘI DUNG TRUNG TÂM
     ════════════════════════════════ -->
<div class="card-box">
  <div class="welcome-text">Chào người bạn tuyệt vời! 💖</div>
  <p class="invite-text">
    Mình có một <strong style="color:#ffd700">món quà bí mật</strong><br>
    dành riêng cho bạn thôi đó nha! 🎁<br>
    <span style="font-size:0.85em; opacity:0.8">Bấm vào để nhận ngay nhé...</span>
  </p>
  <button class="gift-btn" onclick="showTroll()">
    🎀 Nhận Quà Ngay 🎀
  </button>
</div>

<!-- ════════════════════════════════
     OVERLAY TROLL
     ════════════════════════════════ -->
<div class="overlay" id="trollOverlay">
  <!-- Nút đóng -->
  <button class="close-btn" onclick="hideTroll()" title="Đóng">✕</button>

  <!-- Kim tuyến rơi trong overlay -->
  <div class="overlay-glitter" id="overlayGlitter"></div>

  <!--
    ╔══════════════════════════════════════╗
    ║  THAY LINK ẢNH VÀO ĐÂY ↓            ║
    ║  Xóa dòng avatar-placeholder và     ║
    ║  bỏ comment thẻ <img> phía dưới     ║
    ╚══════════════════════════════════════╝
  -->
  <img class="troll-avatar" src="Screenshot 2026-06-05 110557.png" alt="troll">

  <!--
    ╔══════════════════════════════════════╗
    ║  THAY TÊN VÀO ĐÂY ↓                 ║
    ╚══════════════════════════════════════╝
  -->
  <div class="troll-text" id="trollText">
    ✨ KAYLEE BÊ ĐÊ - TAMAKI HOOC MÔN NAM ✨
  </div>
</div>

<script>
  /* ══════════════════════════════════════
     TẠO KIM TUYẾN NỀN
     ══════════════════════════════════════ */
  const sparkleLayer = document.getElementById('sparkleLayer');
  const colors = ['#ffd700','#ffe066','#ffffff','#ffaacc','#ffcc00','#ff99bb'];
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const size = Math.random() * 5 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay:${Math.random()*3}s;
      animation-duration:${1.5 + Math.random()*2.5}s;
    `;
    sparkleLayer.appendChild(s);
  }

  /* ══════════════════════════════════════
     TẠO KIM TUYẾN RƠI TRONG OVERLAY
     ══════════════════════════════════════ */
  const overlayGlitter = document.getElementById('overlayGlitter');
  for (let i = 0; i < 50; i++) {
    const g = document.createElement('div');
    g.className = 'og';
    const size = Math.random() * 6 + 2;
    g.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*10 - 5}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay:${Math.random()*6}s;
      animation-duration:${3 + Math.random()*5}s;
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
    `;
    overlayGlitter.appendChild(g);
  }

  /* ══════════════════════════════════════
     LOGIC HIỆN / ẨN TROLL
     ══════════════════════════════════════ */
  function showTroll() {
    document.getElementById('trollOverlay').classList.add('show');
  }

  function hideTroll() {
    document.getElementById('trollOverlay').classList.remove('show');
  }

  /* Bấm vùng ngoài để đóng */
  document.getElementById('trollOverlay').addEventListener('click', function(e) {
    if (e.target === this) hideTroll();
  });
</script>
</body>
